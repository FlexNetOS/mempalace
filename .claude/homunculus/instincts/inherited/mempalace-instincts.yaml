# Mempalace Workflow Backend Extension Workflow

## Action

Follow the backend-extension-workflow workflow:
1. Implement or refactor backend-neutral logic in mempalace/embedding.py or similar shared modules.
2. Update or create backend-specific modules (e.g., mempalace/backends/ruvector_postgres.py, mempalace/backends/chroma.py) to use the new logic or provide shims.
3. Update server routing or integration points (e.g., mempalace/mcp_server.py) to support the new backend or abstraction.
4. Write or update tests to cover new backend behavior and routing (e.g., tests/test_backend_routing.py, tests/test_ruvector_postgres_migrate.py).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: mempalace/embedding.py, mempalace/backends/chroma.py, mempalace/backends/ruvector_postgres.py

